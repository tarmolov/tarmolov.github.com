name: Sync posts from Tracker

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch posts from Tracker
        env:
          TRACKER_TOKEN: ${{ secrets.TRACKER_TOKEN }}
          TRACKER_ORG_ID: ${{ secrets.TRACKER_ORG_ID }}
          SITE_URL: https://tarmolov.ru
        run: python3 scripts/fetch-tracker.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated posts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "cogery-agent"
          git config user.email "cogery-agent@yandex.ru"
          git add content/ static/i/ .tracker-state.json
          git commit -m "sync: update posts from Tracker $(date -u +%Y-%m-%dT%H:%M)"
          git push

      - name: Build and deploy Hugo
        if: steps.changes.outputs.changed == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Deploy to gh-pages
        if: steps.changes.outputs.changed == 'true'
        run: hugo --minify

      - name: Push gh-pages
        if: steps.changes.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: tarmolov.ru
