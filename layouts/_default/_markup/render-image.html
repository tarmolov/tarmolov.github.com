{{ $src := .Destination }}
{{ if not (or (hasPrefix $src "http://") (hasPrefix $src "https://")) }}
  {{ if hasPrefix $src "/" }}
    {{/* absolute site path — keep as-is */}}
  {{ else }}
    {{ $src = printf "%s%s" .Page.RelPermalink $src }}
  {{ end }}
{{ end }}
<img loading="lazy" src="{{ $src }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }} />
