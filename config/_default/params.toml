colorScheme = "slate"
enableSearch = true
defaultAppearance = "dark"
autoSwitchAppearance = true
smartTOC = true
smartTOCHideUnfocusedChildren = true

[header]
  layout = "fixed-fill-blur"

[footer]
  showThemeAttribution = false

[homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 5
  showMoreLink = true
  showMoreLinkDest = "/posts/"

[author]
  name = "Тармолов"
  headline = "про работу"
  bio = "Последние 10 лет я работаю в компании Яндекс, в рамках которой я вырос от разработчика интерфейсов до руководителя отдела разработки. За это время я попробовал на себе роли разработчика, саппорта, документатора, менеджера и в конечном счёте руководителя. Всё это позволяет мне комплексно смотреть на руководство командой. Люблю и умею наводить порядок и чинить то, что сломано, как технологические моменты, так и процессы. Считаю, что люди — это самое важное, и много времени трачу на их развитие и мотивацию.\n\nНа этом сайте делюсь своим опытом и философией :)\n\nПишу про Яндекс, про геосервисы, про разработку, про руководство, про жизнь."
  image = "img/avatar.jpg"

[article]
  showDate = true
  showAuthor = false
  showReadingTime = true
  showTableOfContents = true

[list]
  showCards = true
  showSummary = true
  constrainItemsWidth = true
